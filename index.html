<!doctype html>
<html lang="en">
  <head>
    <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
    <base href="/karoki-gallery/" />

    <meta charset="UTF-8" />
    <meta content="IE=Edge" http-equiv="X-UA-Compatible" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta
      name="description"
      content="Karoki Gallery - Your personal media gallery and storage platform."
    />
    <meta name="theme-color" content="#0175C2" />
    <meta name="color-scheme" content="light dark" />

    <!-- PWA Meta Tags -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="Karoki Gallery" />

    <!-- iOS meta tags & icons -->
    <link rel="apple-touch-icon" href="icons/Icon-192.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="icons/Icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="icons/Icon-512.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="shortcut icon" type="image/png" href="favicon.png" />

    <title>Karoki Gallery</title>
    <link rel="manifest" href="manifest.json" />

    <!-- Web app metadata -->
    <meta name="keywords" content="gallery, media, storage, photos, videos" />
    <meta name="author" content="Karoki" />
  </head>
  <body>
    <!-- Register PWA Service Worker -->
    <script>
      if ("serviceWorker" in navigator) {
        // Register the Flutter service worker
        window.addEventListener("load", () => {
          navigator.serviceWorker
            .register("flutter_service_worker.js", {
              scope: "/",
            })
            .then((reg) => {
              console.log(
                "Flutter Service Worker registered successfully:",
                reg,
              );
            })
            .catch((err) => {
              console.error("Flutter Service Worker registration failed:", err);
            });

          // Also register custom PWA service worker for enhanced caching
          navigator.serviceWorker
            .register("pwa-service-worker.js", {
              scope: "/",
            })
            .then((reg) => {
              console.log("PWA Service Worker registered successfully:", reg);

              // Check for service worker updates
              setInterval(() => {
                reg.update();
              }, 1000 * 60); // Check every minute
            })
            .catch((err) => {
              console.warn("PWA Service Worker registration failed:", err);
            });
        });

        // Handle service worker updates
        navigator.serviceWorker.addEventListener("controllerchange", () => {
          console.log("Service Worker controller changed");
          window.location.reload();
        });
      }
    </script>

    <script src="flutter_bootstrap.js" async></script>
  </body>
</html>
